  const PATCH_CSS=`
<style id="premier-phase1-css">

<script id="premier-phase1-js">
(function(){
const typeTexts=['쌓기나무와 입체도형','전개도와 주사위','색종이 접기와 펀칭','도형 개수 세기','수와 연산 퍼즐','논리표 조건 추론','최단 거리 가짓수','양팔저울 무게 비교','규칙 찾기','암호 풀기','거울과 디지털 수','달력과 시계','조건에 알맞은 수','평면도형 분할','입체도형 관찰','도형 회전','경우의 수','분수 조건','나머지 규칙','도형 겹치기','거리와 위치','쌍과 짝짓기','색칠 논리','입체 단면','수 배열','문장제 추론','숫자 카드'];
function replaceIntroWording(){document.querySelectorAll('#gfieldIntroScene3 *').forEach(function(el){if(el.children.length===0&&el.textContent){el.textContent=el.textContent.replace(/대표\\s*유형/g,'심화 대표 유형').replace(/빠르게\\s*점검합니다/g,'약점유형을 진단합니다')}})}
function runTypes(){if(window.gfieldIntroTypesStarted)return;window.gfieldIntroTypesStarted=true;const box=document.getElementById('gfieldIntroTypeTunnel');if(!box)return;box.innerHTML='';for(let i=0;i<32;i++){const el=document.createElement('div');el.className='type-line';el.textContent=typeTexts[i%typeTexts.length];const side=i%4;let x,y;if(side===0){x=(-92-Math.random()*28)+'vw';y=(Math.random()*110-55)+'vh'}else if(side===1){x=(68+Math.random()*38)+'vw';y=(Math.random()*110-55)+'vh'}else if(side===2){x=(Math.random()*130-65)+'vw';y=(-68-Math.random()*18)+'vh'}else{x=(Math.random()*130-65)+'vw';y=(50+Math.random()*28)+'vh'}el.style.setProperty('--x',x);el.style.setProperty('--y',y);el.style.setProperty('--r',(Math.random()*70-35)+'deg');el.style.animationDelay=(i*.09)+'s';box.appendChild(el)}}
function patchActions(){document.querySelectorAll('.login-card .quick-download-actions').forEach(el=>el.remove());const top=document.querySelector('.action-btns');if(top&&!top.dataset.downloadPatched){top.dataset.downloadPatched='1';top.innerHTML='<a class="video-btn btn-youtube" href="#" onclick="return false">▶ 설명회 영상</a><a class="video-btn btn-youtube" href="#" onclick="return false">▶ 풀이 영상 전체보기</a><button class="video-btn download-book-btn" type="button" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="video-btn download-answer-btn" type="button" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><a class="video-btn btn-kakao" href="https://open.kakao.com/me/gfield" target="_blank">💬 유사문제/상담 신청하기</a>'}document.querySelectorAll('.result-actions').forEach(function(box){if(box.dataset.phase1Patched)return;box.dataset.phase1Patched='1';box.innerHTML='<button class="btn-action btn-action-outline" onclick="toggleAllAccordions()">📂 오답 상세 한 번에 보기</button><button class="btn-action btn-action-dark" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><button class="btn-action btn-action-outline">📊 종합 진단 결과 분석</button>'})}
function patchPreLogin(){const login=document.querySelector('.login-card');if(!login)return;let brief=document.getElementById('preLoginBrief');if(!brief){brief=document.createElement('section');brief.id='preLoginBrief';brief.className='pre-login-brief';brief.innerHTML='<div class="eyebrow">PREMIER HYPER FOCUS</div><h2>진단 전에, 오늘 무엇을 확인하는지 먼저 안내드립니다.</h2><p>이 검사는 소마 프리미어(대치) 대비 과정에서 자주 흔들리는 심화 대표 유형을 빠르게 점검하고, 아이의 약점 유형을 확인하기 위한 진단입니다.</p><div class="pre-login-grid"><div><b>1. 대표 유형 점검</b><span>쌓기나무, 전개도, 경우의 수, 논리 조건 등 핵심 유형을 확인합니다.</span></div><div><b>2. 약점 유형 확인</b><span>맞고 틀림보다 어떤 유형에서 시간이 걸리는지 보는 것이 중요합니다.</span></div><div><b>3. 결과 해석</b><span>진단 후 보완해야 할 유형과 학습 방향을 확인합니다.</span></div></div><p>준비가 되면 아래 버튼을 눌러 이름과 승인번호를 입력해 주세요.</p><button type="button" class="pre-login-start">진단 시작하기</button>';login.parentNode.insertBefore(brief,login);brief.querySelector('.pre-login-start').onclick=function(){sessionStorage.setItem('gfieldPreLoginBriefDone','1');brief.style.display='none';login.classList.remove('prelogin-locked');login.scrollIntoView({behavior:'smooth',block:'center'});};}if(sessionStorage.getItem('gfieldPreLoginBriefDone')==='1'){brief.style.display='none';login.classList.remove('prelogin-locked')}else{brief.style.display='block';login.classList.add('prelogin-locked')}}
function loadScript(src){return new Promise(function(resolve,reject){if(document.querySelector('script[src="'+src+'"]'))return resolve();const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);})}
function stampText(){const n=(document.getElementById('studentName')?.value||'학생').trim()||'학생';const c=(document.getElementById('authCode')?.value||'승인번호').trim()||'승인번호';return n+' · '+c}
async function ensurePdfLib(){if(!window.html2pdf)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js')}
async function downloadAnswerPdf(){await ensurePdfLib();if(typeof printAllAnswers!=='function'){alert('답안 생성 함수를 찾지 못했습니다.');return}const oldPrint=window.print;window.print=function(){};printAllAnswers();window.print=oldPrint;setTimeout(async function(){const area=document.getElementById('allAnswerPrint');if(!area){alert('답안 영역을 찾지 못했습니다.');return}const opt={margin:8,filename:'프리미어_전체답안_'+stampText().replace(/[\\/:*?"<>|]/g,'_')+'.pdf',image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}};await html2pdf().set(opt).from(area).save();document.body.classList.remove('answer-print-mode')},220)}
function bookImages(){const arr=[];['BOOK_IMAGES','bookImages','bookImageUrls','BOOK_IMAGE_URLS'].forEach(k=>{if(Array.isArray(window[k]))arr.push(...window[k])});document.querySelectorAll('[data-book-src],img[data-book-page],.book-page img,#bookPages img,img[src*="book"],img[src*="교재"],a[href$=".jpg"],a[href$=".jpeg"],a[href$=".png"]').forEach(el=>{arr.push(el.dataset?.bookSrc||el.currentSrc||el.src||el.href)});return [...new Set(arr)].filter(Boolean)}
async function imagePdf(urls){await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');const jsPDF=window.jspdf.jsPDF;const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});const stamp=stampText();for(let i=0;i<urls.length;i++){if(i)pdf.addPage();await new Promise(function(resolve){const img=new Image();img.crossOrigin='anonymous';img.onload=function(){const w=210,h=297;pdf.addImage(img,'JPEG',0,0,w,h);pdf.setTextColor(80,80,80);if(pdf.setGState)pdf.setGState(new pdf.GState({opacity:.16}));pdf.setFontSize(28);pdf.text(stamp,105,285,{align:'center'});if(pdf.setGState)pdf.setGState(new pdf.GState({opacity:1}));resolve()};img.onerror=function(){resolve()};img.src=urls[i]})}pdf.save('프리미어_교재_'+stamp.replace(/[\\/:*?"<>|]/g,'_')+'.pdf')}
async function downloadBookPdf(){const urls=bookImages();if(!urls.length){if(typeof window.printBookPdf==='function')return window.printBookPdf();alert('교재 JPG 이미지 목록을 찾지 못했습니다. 기존 교재 이미지 배열 또는 data-book-src가 필요합니다.');return}await imagePdf(urls)}
window.downloadBookPdf=downloadBookPdf;window.downloadAnswerPdf=downloadAnswerPdf;
function readyPatch(){replaceIntroWording();patchActions();patchPreLogin();const logo=document.querySelector('#gfieldIntro .intro-logo');if(logo)logo.src='${LOGO_URL}';if(document.querySelector('#gfieldIntroScene3.on'))runTypes()}
setInterval(readyPatch,350);readyPatch();
})();
<\/script>`;
  let html=await fetch(BASE_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('base fetch failed '+r.status);return r.text();});
  html=html.replace('<img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD">','<img class="intro-logo" src="'+LOGO_URL+'" alt="GFIELD">');
  html=html.replace(/대표\s*유형을<br>빠르게\s*점검합니다/g,'심화 대표 유형으로<br>약점유형을 진단합니다');html=html.replace(/대표\s*유형/g,'심화 대표 유형');html=html.replace(/빠르게\s*점검합니다/g,'약점유형을 진단합니다');html=html.replace(/영재\s*클래스/g,'필즈 TOPCLASS');html=html.replace(/테마\s*프리미어/g,'소마 프리미어(대치)');
  const rs=html.indexOf('const recordData=');const re=rs>-1?html.indexOf(';',rs):-1;if(rs>-1&&re>-1)html=html.slice(0,rs)+SCOREBOARD_DATA+html.slice(re+1);
  html=html.replace(/const scenes=\['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'\],times=\[[^\]]+\]/,'const scenes=[\'gfieldIntroScene0\',\'gfieldIntroScene1\',\'gfieldIntroScene2\',\'gfieldIntroScene3\',\'gfieldIntroScene4\',\'gfieldIntroScene5\'],times=[0,2300,5000,7200,9600,11800]');
  html=html.replace(/let c=5;/g,'let c=3;');html=html.replace(/let n=5;/g,'let n=3;');html=html.replace(/\},900\);/g,'},850);');html=html.replace(/setTimeout\(\(\)=>window\.gfieldIntroGoDiagnosis\(\),20300\)/g,'setTimeout(()=>window.gfieldIntroGoDiagnosis(),15200)');
  html=html.replace('</head>',PATCH_CSS+'</head>');html=html.replace('</body>',PATCH_JS+'<div id="G_FIELD_PAGE_READY_MARKER"></div></body>');
  document.open();document.write(html);document.close();
})().catch(err=>{document.getElementById('boot').style.display='none';document.open();document.write('<!doctype html><meta charset="utf-8"><body style="font-family:sans-serif;padding:30px">페이지 로딩 오류: '+err.message+'</body>');document.close();});
</script>
