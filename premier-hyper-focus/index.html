<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지필드 영재교육 — 프리미어 합격 진단 리포트</title>
<style>
html,body{margin:0;min-height:100%;background:#02050b;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}#boot{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:#02050b}#boot h1,#boot p{display:none}.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.12);border-top-color:rgba(212,175,55,.7);border-radius:50%;animation:s .8s linear infinite;margin:0 auto}@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div><h1></h1><p></p><div class="spin"></div></div></div>
<script>
(async function(){
  const BASE_URL='https://raw.githubusercontent.com/docssam1/Hyper-Focus-answer-Key/ebcbacd3ef208a8ba2de36babc35a3858e08e23d/premier-hyper-focus/index.html';
  const LOGO_URL='https://lh3.googleusercontent.com/d/1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL';
  const PATCH_CSS=`
<style id="premier-phase1-css">
#G_FIELD_PAGE_READY_MARKER{display:none}
#gfieldIntro .intro-scene{transition:opacity .82s ease,transform .82s cubic-bezier(.16,1,.3,1),filter .82s ease!important;filter:blur(5px)}
#gfieldIntro .type-tunnel{display:block!important;position:absolute;inset:0;perspective:760px;overflow:hidden;opacity:.95;z-index:1!important}
#gfieldIntro .type-line{position:absolute;left:50%;top:50%;white-space:nowrap;color:rgba(248,221,131,.72);font-weight:900;letter-spacing:-.04em;font-size:clamp(15px,3.2vw,32px);text-shadow:0 10px 28px rgba(0,0,0,.6);animation:introSuck 3s linear infinite;opacity:.66;filter:blur(.35px)}
#gfieldIntro .type-line:nth-child(2n){color:rgba(255,255,255,.62);opacity:.56}#gfieldIntro .type-line:nth-child(3n){color:rgba(248,221,131,.55);opacity:.46;filter:blur(1px)}
@keyframes introSuck{0%{transform:translate3d(var(--x),var(--y),220px) rotateX(62deg) rotateZ(var(--r)) scale(1.2);opacity:0}12%{opacity:.78}60%{opacity:.42}100%{transform:translate3d(-50%,-50%,-520px) rotateX(78deg) rotateZ(calc(var(--r) + 90deg)) scale(.05);opacity:0;filter:blur(6px)}}
#gfieldIntroScene3:before{content:"";position:absolute;left:25%;right:25%;top:31%;bottom:31%;z-index:2;background:radial-gradient(circle at center,rgba(2,5,11,.74),rgba(2,5,11,.38) 58%,transparent 82%);pointer-events:none}#gfieldIntroScene3>div:not(.type-tunnel){position:relative;z-index:3}
#gfieldIntro .gnum.hit{transform:scale(1.08);color:#fff;text-shadow:0 0 34px rgba(255,255,255,.5),0 0 70px rgba(212,175,55,.45);transition:transform .22s ease,color .22s ease,text-shadow .22s ease}#gfieldIntro .intro-flash{position:absolute;inset:0;z-index:30;pointer-events:none;background:radial-gradient(circle at center,rgba(255,255,255,.96) 0%,rgba(255,240,190,.64) 16%,rgba(255,255,255,0) 52%);opacity:0;mix-blend-mode:screen}#gfieldIntro .intro-flash.on{animation:introFlash .32s ease-out}@keyframes introFlash{0%{opacity:0}18%{opacity:.96}100%{opacity:0}}
.action-btns .download-book-btn{background:#020b14!important;color:#fff!important;border:2px solid #d4af37!important}.action-btns .download-answer-btn{background:#020b14!important;color:#fff!important;border:2px solid #d4af37!important}.login-card .quick-download-actions{display:none!important}
</style>`;
  const PATCH_JS=`
<script id="premier-phase1-js">
(function(){
const typeTexts=['쌓기나무와 입체도형','전개도와 주사위','색종이 접기와 펀칭','도형 개수 세기','수와 연산 퍼즐','논리표 조건 추론','최단 거리 가짓수','양팔저울 무게 비교','규칙 찾기','암호 풀기','거울과 디지털 수','달력과 시계','조건에 알맞은 수','평면도형 분할','입체도형 관찰'];
function replaceIntroWording(){document.querySelectorAll('#gfieldIntroScene3 *').forEach(function(el){if(el.children.length===0&&el.textContent){el.textContent=el.textContent.replace(/대표\\s*유형/g,'심화 대표 유형').replace(/빠르게\\s*점검합니다/g,'약점유형을 진단합니다')}})}
function forceCountdown321(){const scene=document.getElementById('gfieldIntroScene5');const num=document.getElementById('gfieldIntroCountNum');if(!scene||!num||!scene.classList.contains('on'))return;const raw=(num.textContent||'').trim();if(raw==='5')num.textContent='3';else if(raw==='4')num.textContent='2';else if(raw==='3')num.textContent='1';else if(raw==='2')num.textContent='1';}
function runTypes(){if(window.gfieldIntroTypesStarted)return;window.gfieldIntroTypesStarted=true;const box=document.getElementById('gfieldIntroTypeTunnel');if(!box)return;box.innerHTML='';for(let i=0;i<32;i++){const el=document.createElement('div');el.className='type-line';el.textContent=typeTexts[i%typeTexts.length];const side=i%4;let x,y;if(side===0){x=(-92-Math.random()*28)+'vw';y=(Math.random()*110-55)+'vh'}else if(side===1){x=(68+Math.random()*38)+'vw';y=(Math.random()*110-55)+'vh'}else if(side===2){x=(Math.random()*130-65)+'vw';y=(-68-Math.random()*18)+'vh'}else{x=(Math.random()*130-65)+'vw';y=(50+Math.random()*28)+'vh'}el.style.setProperty('--x',x);el.style.setProperty('--y',y);el.style.setProperty('--r',(Math.random()*70-35)+'deg');el.style.animationDelay=(i*.09)+'s';box.appendChild(el)}}
function patchActions(){document.querySelectorAll('.login-card .quick-download-actions').forEach(el=>el.remove());const top=document.querySelector('.action-btns');if(top&&!top.dataset.downloadPatched){top.dataset.downloadPatched='1';top.innerHTML='<a class="video-btn btn-youtube" href="#" onclick="return false">▶ 설명회 영상</a><a class="video-btn btn-youtube" href="#" onclick="return false">▶ 풀이 영상 전체보기</a><button class="video-btn download-book-btn" type="button" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="video-btn download-answer-btn" type="button" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><a class="video-btn btn-kakao" href="https://open.kakao.com/me/gfield" target="_blank">💬 유사문제/상담 신청하기</a>'}document.querySelectorAll('.result-actions').forEach(function(box){if(box.dataset.phase1Patched)return;box.dataset.phase1Patched='1';box.innerHTML='<button class="btn-action btn-action-outline" onclick="toggleAllAccordions()">📂 오답 상세 한 번에 보기</button><button class="btn-action btn-action-dark" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><button class="btn-action btn-action-outline">📊 종합 진단 결과 분석</button>'})}
window.downloadBookPdf=function(){alert('교재 PDF 직접 저장 기능은 2차에서 연결합니다. 현재는 인트로/버튼 안정화 단계입니다.')};window.downloadAnswerPdf=function(){alert('전체 답안 PDF 직접 저장 기능은 2차에서 연결합니다. 현재는 인트로/버튼 안정화 단계입니다.')};
function readyPatch(){replaceIntroWording();forceCountdown321();patchActions();const logo=document.querySelector('#gfieldIntro .intro-logo');if(logo)logo.src='${LOGO_URL}';if(document.querySelector('#gfieldIntroScene3.on'))runTypes()}
setInterval(readyPatch,500);setInterval(forceCountdown321,50);readyPatch();
})();
<\/script>`;
  const SCOREBOARD_DATA="const recordData={left:[{title:'생각하는 황소 경시합격',years:[['2021',15],['2022',14],['2023',18],['2024',29],['2025',20],['2026',12]],total:108},{title:'대치 소마 프리미어',years:[['2020',10],['2021',11],['2022',5],['2023',12],['2024',7],['2025',8],['2026',8]],total:61}],right:[{title:'대치 필즈 더 클래식 TOP CLASS',years:[['2021',8],['2023',13],['2024',17],['2025',10]],total:48},{title:'영재원 & 성대경시',years:[['교육청 영재원',89],['대학부설 영재원',78],['성대경시 대상',13]],total:180}],grand:400};";
  let html=await fetch(BASE_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('base fetch failed '+r.status);return r.text();});
  html=html.replace('<div id="gfieldIntro"><div class="intro-bg"></div><button class="intro-skip" type="button" onclick="gfieldIntroGoDiagnosis()">SKIP</button>','<div id="gfieldIntro"><div class="intro-bg"></div><div class="intro-flash" id="gfieldIntroFlash"></div><button class="intro-skip" type="button" onclick="gfieldIntroGoDiagnosis()">SKIP</button>');
  html=html.replace('<img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD">','<img class="intro-logo" src="'+LOGO_URL+'" alt="GFIELD">');
  html=html.replace(/대표\s*유형을<br>빠르게\s*점검합니다/g,'심화 대표 유형으로<br>약점유형을 진단합니다');
  html=html.replace(/대표\s*유형/g,'심화 대표 유형');html=html.replace(/빠르게\s*점검합니다/g,'약점유형을 진단합니다');html=html.replace(/영재\s*클래스/g,'필즈 TOPCLASS');html=html.replace(/테마\s*프리미어/g,'소마 프리미어(대치)');
  html=html.replace(/const recordData=\{left:\[[\s\S]*?\],grand:400\};/,SCOREBOARD_DATA);
  html=html.replace(/const scenes=\['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'\],times=\[[^\]]+\]/,'const scenes=[\'gfieldIntroScene0\',\'gfieldIntroScene1\',\'gfieldIntroScene2\',\'gfieldIntroScene3\',\'gfieldIntroScene4\',\'gfieldIntroScene5\'],times=[0,2300,5000,7200,9600,11800]');
  html=html.replace(/let c=5;/g,'let c=3;');html=html.replace(/let n=5;/g,'let n=3;');html=html.replace(/\},900\);/g,'},850);');html=html.replace(/setTimeout\(\(\)=>window\.gfieldIntroGoDiagnosis\(\),20300\)/g,'setTimeout(()=>window.gfieldIntroGoDiagnosis(),15200)');
  html=html.replace('</head>',PATCH_CSS+'</head>');html=html.replace('</body>',PATCH_JS+'<div id="G_FIELD_PAGE_READY_MARKER"></div></body>');
  document.open();document.write(html);document.close();
})().catch(err=>{document.getElementById('boot').style.display='none';document.open();document.write('<!doctype html><meta charset="utf-8"><body style="font-family:sans-serif;padding:30px">페이지 로딩 오류: '+err.message+'</body>');document.close();});
</script>
</body>
</html>
