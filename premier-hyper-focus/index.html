  const PATCH_CSS=`
<style id="premier-final-patch-css">
#G_FIELD_PAGE_READY_MARKER{display:none}
.btn-action-dark{background:#0d1b2a!important;color:#fff!important;border:2px solid #0d1b2a!important}.btn-action-dark:hover{background:#000!important;color:#fff!important}.download-area{display:none}.pdf-page{position:relative;width:210mm;min-height:297mm;background:#fff;color:#111;padding:14mm;box-sizing:border-box;page-break-after:always;overflow:hidden}.pdf-page.book-page{padding:0;display:flex;align-items:center;justify-content:center}.pdf-page.book-page img{width:210mm;height:297mm;object-fit:contain;display:block}.pdf-watermark,.pdf-global-watermark{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-32deg);width:190mm;text-align:center;font-size:34pt;font-weight:900;color:#777;opacity:.035;pointer-events:none;z-index:50;line-height:1.25;white-space:nowrap;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.pdf-global-watermark{display:none}.answer-download-title{font-family:'Noto Serif KR',serif;font-size:20pt;font-weight:800;color:#0d1b2a;border-bottom:2px solid #0d1b2a;padding-bottom:8px;margin-bottom:12px}.answer-download-meta{font-size:10pt;color:#555;margin-bottom:12px}.answer-row{break-inside:avoid;page-break-inside:avoid;border:1px solid #ddd;border-left:4px solid #c9a84c;border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#fff}.answer-row h4{margin:0 0 5px;font-size:10.5pt;color:#0d1b2a;line-height:1.45}.answer-row .answer{font-size:10pt;font-weight:800;color:#c0392b;margin-bottom:4px}.answer-row p{margin:3px 0;font-size:8.6pt;line-height:1.5;color:#333}.report-print-title{display:none}

important}body.pdf-report-mode .diagnosis-text-container{display:block!important}body.pdf-report-mode .diag-card{padding:10px!important;margin-bottom:8px!important;break-inside:avoid!important;page-break-inside:avoid!important}body.pdf-report-mode .diag-card.prediction{background:#fff!important;border:1px solid #0d1b2a!important}body.pdf-report-mode .diag-card.prediction h3,body.pdf-report-mode .diag-card.prediction p,body.pdf-report-mode .diag-card.prediction .highlight-msg{color:#111!important}body.pdf-report-mode .result-list-box{background:transparent!important;border:none!important;padding:0!important;margin-top:8px!important}body.pdf-report-mode .res-card{break-inside:avoid!important;page-break-inside:avoid!important;margin-bottom:8px!important}body.pdf-report-mode .res-card-body{display:block!important}body.pdf-report-mode .pdf-global-watermark{display:block!important;position:fixed!important;left:50%!important;top:50%!important}@page{size:A4 portrait;margin:0}}

  const PATCH_JS=`
<script id="premier-final-patch-js">
(function(){
function readyPatch(){
  var logo=document.querySelector('#gfieldIntro .intro-logo'); if(logo){logo.src='${LOGO_URL}'; logo.onerror=function(){this.outerHTML='<div style="font-size:34px;font-weight:900;color:#d4af37;margin-bottom:20px;letter-spacing:-.04em">G-FIELD</div>'};}
  document.querySelectorAll('.result-actions').forEach(function(box){ if(box.dataset.finalPatched)return; box.dataset.finalPatched='1'; box.innerHTML='<button class="btn-action btn-action-outline" onclick="toggleAllAccordions()">📂 오답 상세 한 번에 보기</button><button class="btn-action btn-action-dark" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadDiagnosisReport()">📊 종합 진단 결과 분석</button><button class="btn-action btn-action-fill" onclick="window.open(\'https://open.kakao.com/me/gfield\', \'_blank\')">💬 지필드 카톡 맞춤 상담</button>'; });
  var rb=document.querySelector('#result-area .result-body'); if(rb && !rb.querySelector('.report-print-title')) rb.insertAdjacentHTML('afterbegin','<div class="report-print-title">종합 진단 결과 분석</div>');
  if(!document.getElementById('bookDownloadArea')) document.body.insertAdjacentHTML('beforeend','<div id="bookDownloadArea" class="download-area"></div><div id="answerDownloadArea" class="download-area"></div>');
}
function getDownloadUserInfo(){const name=(document.getElementById('studentName')?.value||'학생').trim()||'학생';const code=(document.getElementById('authCode')?.value||'승인번호').trim()||'승인번호';return {name,code,watermark:name+' · '+code};}
function collectAllItemsSorted(){const items=[];(window.data||[]).forEach(cat=>cat.items.forEach(item=>items.push(Object.assign({},item,{categoryTitle:cat.categoryTitle,shortName:cat.shortName}))));return items.sort((a,b)=>a.id-b.id);}
function runPdfPrintMode(mode,afterMs=1200){document.body.classList.add(mode);setTimeout(()=>{window.print();setTimeout(()=>document.body.classList.remove(mode),afterMs);},250);}
function chunkArray(arr,size){const out=[];for(let i=0;i<arr.length;i+=size)out.push(arr.slice(i,i+size));return out;}
window.downloadBookPdf=function(){readyPatch();const info=getDownloadUserInfo();const area=document.getElementById('bookDownloadArea');const pages=Array.from({length:29},(_,i)=>'assets/book/page-'+String(i+1).padStart(2,'0')+'.jpg');area.innerHTML=pages.map((src,idx)=>'<section class="pdf-page book-page"><img src="'+src+'" alt="교재 '+(idx+1)+'쪽"><div class="pdf-watermark">'+info.watermark+'</div></section>').join('');runPdfPrintMode('pdf-book-mode');};
window.downloadAnswerPdf=function(){readyPatch();const info=getDownloadUserInfo();const area=document.getElementById('answerDownloadArea');const pages=chunkArray(collectAllItemsSorted(),12);area.innerHTML=pages.map((items,pageIdx)=>'<section class="pdf-page"><div class="pdf-watermark">'+info.watermark+'</div><div class="answer-download-title">프리미어 하이퍼 포커스 전체 답안</div><div class="answer-download-meta">'+info.name+' 학생 · 승인번호 '+info.code+' · 1번부터 54번까지 번호순 정리 · '+(pageIdx+1)+'/'+pages.length+'</div>'+items.map(item=>'<div class="answer-row"><h4>'+item.id+'. '+item.text+'</h4><div class="answer">정답: '+(item.ans||'-')+'</div><p><strong>유형:</strong> '+(item.shortName||item.categoryTitle)+'</p><p><strong>풀이 핵심:</strong> '+(item.tTip||'')+'</p>'+(item.mTip?'<p><strong>지도 포인트:</strong> '+item.mTip+'</p>':'')+'</div>').join('')+'</section>').join('');runPdfPrintMode('pdf-answer-mode');};
window.downloadDiagnosisReport=function(){readyPatch();document.querySelectorAll('#resultListBox .res-card').forEach(card=>card.classList.add('open'));const info=getDownloadUserInfo();let wm=document.getElementById('reportPdfWatermark');if(!wm){wm=document.createElement('div');wm.id='reportPdfWatermark';wm.className='pdf-global-watermark';document.body.appendChild(wm);}wm.textContent=info.watermark;runPdfPrintMode('pdf-report-mode');};
setInterval(readyPatch,700); readyPatch();
})();
<\/script>`;
  let html=await fetch(BASE_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('base fetch failed '+r.status);return r.text();});
  html=html.replace('<img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD">','<img class="intro-logo" src="'+LOGO_URL+'" alt="GFIELD">');
  html=html.replace('transition:opacity 1s ease,transform 1s cubic-bezier(.16,1,.3,1),filter 1s ease;','transition:opacity .62s ease,transform .62s cubic-bezier(.16,1,.3,1),filter .62s ease;');
  html=html.replace(/filter:blur\(10px\);/g,'filter:blur(6px);');
  html=html.replace(/animation:introSuck 3\.2s linear infinite;/g,'animation:introSuck 2.45s linear infinite;');
  html=html.replace(/const scenes=\['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'\],times=\[[^\]]+\]/,'const scenes=[\'gfieldIntroScene0\',\'gfieldIntroScene1\',\'gfieldIntroScene2\',\'gfieldIntroScene3\',\'gfieldIntroScene4\',\'gfieldIntroScene5\'],times=[0,1800,5100,6900,8800,10300]');
  html=html.replace(/for\(let i=0;i<44;i\+\+\)\{const el=document\.createElement\('div'\);el\.className='type-line';el\.textContent=typeTexts\[i%typeTexts\.length\];el\.style\.setProperty\('--x',\(Math\.random\(\)\*160-80\)\+'vw'\);el\.style\.setProperty\('--y',\(Math\.random\(\)\*120-60\)\+'vh'\);el\.style\.setProperty\('--r',\(Math\.random\(\)\*90-45\)\+'deg'\);el\.style\.animationDelay=\(i\*\.075\)\+'s';box\.appendChild\(el\)\}/,"for(let i=0;i<28;i++){const el=document.createElement('div');el.className='type-line';el.textContent=typeTexts[i%typeTexts.length];const side=i%4;const x=side===0?(-86-Math.random()*28):(side===1?(58+Math.random()*44):(Math.random()*120-60));const y=side===2?(-64-Math.random()*22):(side===3?(42+Math.random()*30):(Math.random()*96-48));el.style.setProperty('--x',x+'vw');el.style.setProperty('--y',y+'vh');el.style.setProperty('--r',(Math.random()*70-35)+'deg');el.style.animationDelay=(i*.105)+'s';box.appendChild(el)}");
  html=html.replace(/\},900\);/g,'},650);');
  html=html.replace(/setTimeout\(\(\)=>window\.gfieldIntroGoDiagnosis\(\),20300\)/g,'setTimeout(()=>window.gfieldIntroGoDiagnosis(),14100)');
  html=html.replace('</head>',PATCH_CSS+'</head>');
  html=html.replace('</body>',PATCH_JS+'<div id="G_FIELD_PAGE_READY_MARKER"></div></body>');
  document.open(); document.write(html); document.close();
})().catch(err=>{document.getElementById('boot').innerHTML='<div><h1>페이지 로딩 오류</h1><p>'+err.message+'</p></div>';});
</script>
