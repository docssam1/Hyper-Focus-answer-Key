<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지필드 영재교육 - 프리미어 합격 진단 리포트</title>
<style>
html,body{margin:0;min-height:100%;background:#02050b;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}
#boot{position:fixed;inset:0;display:grid;place-items:center;background:#02050b;z-index:99999}.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.12);border-top-color:rgba(212,175,55,.7);border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div class="spin"></div></div>
<script>
(async function(){
  const STABLE_URL='https://raw.githubusercontent.com/docssam1/Hyper-Focus-answer-Key/5eb1f38/premier-hyper-focus/index.html';
  try{
    const res=await fetch(STABLE_URL,{cache:'no-store'});
    if(!res.ok) throw new Error('stable fetch failed '+res.status);
    const html=await res.text();
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.body.innerHTML='<div style="padding:28px;font-family:sans-serif;color:#fff;background:#02050b">페이지 복구 중 오류가 발생했습니다. 새로고침해 주세요.<br>'+err.message+'</div>';
  }
})();
</script>
</body>
</html>
