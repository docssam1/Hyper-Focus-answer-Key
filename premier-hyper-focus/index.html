  const PATCH_CSS=`
<style id="premier-final-patch-css">
#G_FIELD_PAGE_READY_MARKER{display:none}
#gfieldIntroScene3 .type-line{opacity:0!important;display:none!important}#gfieldIntroScene3:before{content:"";position:absolute;left:18%;right:18%;top:24%;bottom:24%;z-index:1;background:radial-gradient(circle at center,rgba(2,5,11,.82),rgba(2,5,11,.52) 58%,transparent 78%);pointer-events:none}#gfieldIntroScene3>div:not(.type-tunnel){position:relative;z-index:3}.btn-action-dark{background:#0d1b2a!important;color:#fff!important;border:2px solid #0d1b2a!important}.btn-action-dark:hover{background:#000!important;color:#fff!important}.download-area{display:none}.quick-download-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.quick-download-actions button{width:100%;padding:13px 12px;border-radius:8px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer}.quick-download-actions .dark{background:#000;color:#fff;border:1px solid #000}.quick-download-actions .light{background:#fff;color:#0d1b2a;border:1px solid rgba(201,168,76,.55)}.pdf-page{position:relative;width:210mm;min-height:297mm;background:#fff;color:#111;padding:14mm;box-sizing:border-box;page-break-after:always;overflow:hidden}.pdf-page.book-page{padding:0;display:flex;align-items:center;justify-content:center}.pdf-page.book-page img{width:210mm;height:297mm;object-fit:contain;display:block}.pdf-watermark,.pdf-global-watermark{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-32deg);width:190mm;text-align:center;font-size:34pt;font-weight:900;color:#777;opacity:.035;pointer-events:none;z-index:50;line-height:1.25;white-space:nowrap;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.answer-download-title{font-family:'Noto Serif KR',serif;font-size:20pt;font-weight:800;color:#0d1b2a;border-bottom:2px solid #0d1b2a;padding-bottom:8px;margin-bottom:12px}.answer-download-meta{font-size:10pt;color:#555;margin-bottom:12px}.answer-row{break-inside:avoid;page-break-inside:avoid;border:1px solid #ddd;border-left:4px solid #c9a84c;border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#fff}.answer-row h4{margin:0 0 5px;font-size:10.5pt;color:#0d1b2a;line-height:1.45}.answer-row .answer{font-size:10pt;font-weight:800;color:#c0392b;margin-bottom:4px}.answer-row p{margin:3px 0;font-size:8.6pt;line-height:1.5;color:#333}.report-pdf-wrap{width:210mm;background:#fff;color:#111;padding:12mm;box-sizing:border-box}.report-pdf-title{font-family:'Noto Serif KR',serif;font-size:20pt;font-weight:800;color:#0d1b2a;border-bottom:2px solid #0d1b2a;padding-bottom:8px;margin-bottom:12px}.report-pdf-wrap .result-header{background:#fff!important;color:#111!important;border:1px solid #d9dee8!important;border-left:6px solid #0d1b2a!important;border-radius:12px!important;padding:12px!important;margin-bottom:12px!important;break-inside:avoid!important}.report-pdf-wrap .result-icon{display:none!important}.report-pdf-wrap .result-body{padding:0!important}.report-pdf-wrap .diagnosis-grid{display:block!important;break-inside:auto!important}.report-pdf-wrap .chart-container{height:220px!important;margin:0 0 10px!important;break-inside:avoid!important;page-break-inside:avoid!important;padding:8px!important;border:1px solid #e5e7eb!important;border-radius:10px!important}.report-pdf-wrap .diagnosis-text-container{display:block!important}.report-pdf-wrap .diag-card{padding:10px!important;margin-bottom:8px!important;border:1px solid #e5e7eb!important;background:#fff!important;break-inside:avoid!important;page-break-inside:avoid!important}.report-pdf-wrap .diag-card.prediction,.report-pdf-wrap .diag-card.prediction h3,.report-pdf-wrap .diag-card.prediction p,.report-pdf-wrap .diag-card.prediction .highlight-msg{background:#fff!important;color:#111!important}.report-pdf-wrap .result-list-box{background:#fff!important;border:none!important;padding:0!important;margin-top:8px!important}.report-pdf-wrap .res-card{break-inside:avoid!important;page-break-inside:avoid!important;margin-bottom:8px!important}.report-pdf-wrap .res-card-body{display:block!important}.report-pdf-wrap .result-actions,.report-pdf-wrap .res-video-btn,.report-pdf-wrap .res-card-toggle{display:none!important}.pdf-capture-host{display:block!important;position:absolute!important;left:-10000px!important;top:0!important;z-index:-1!important;background:#fff!important}

  const PATCH_JS=`
<script id="premier-final-patch-js">
(function(){
function readyPatch(){
  var logo=document.querySelector('#gfieldIntro .intro-logo'); if(logo){logo.src='${LOGO_URL}'; logo.onerror=function(){this.outerHTML='<div style="font-size:34px;font-weight:900;color:#d4af37;margin-bottom:20px;letter-spacing:-.04em">G-FIELD</div>'};}
  var login=document.querySelector('.login-card'); if(login && !login.querySelector('.quick-download-actions')){login.insertAdjacentHTML('beforeend','<div class="quick-download-actions"><button class="dark" type="button" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="light" type="button" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button></div>');}
  document.querySelectorAll('.result-actions').forEach(function(box){ if(box.dataset.finalPatched)return; box.dataset.finalPatched='1'; box.innerHTML='<button class="btn-action btn-action-outline" onclick="toggleAllAccordions()">📂 오답 상세 한 번에 보기</button><button class="btn-action btn-action-dark" onclick="downloadBookPdf()">📘 교재 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadAnswerPdf()">🧾 전체 답안 다운로드</button><button class="btn-action btn-action-outline" onclick="downloadDiagnosisReport()">📊 종합 진단 결과 분석</button><button class="btn-action btn-action-fill" onclick="window.open(\'https://open.kakao.com/me/gfield\', \'_blank\')">💬 지필드 카톡 맞춤 상담</button>'; });
  if(!document.getElementById('bookDownloadArea')) document.body.insertAdjacentHTML('beforeend','<div id="bookDownloadArea" class="download-area"></div><div id="answerDownloadArea" class="download-area"></div><div id="reportDownloadArea" class="download-area"></div>');
}
function getDownloadUserInfo(){const name=(document.getElementById('studentName')?.value||'학생').trim()||'학생';const code=(document.getElementById('authCode')?.value||'승인번호').trim()||'승인번호';return {name,code,watermark:name+' · '+code};}
function collectAllItemsSorted(){const items=[];(window.data||[]).forEach(cat=>cat.items.forEach(item=>items.push(Object.assign({},item,{categoryTitle:cat.categoryTitle,shortName:cat.shortName}))));return items.sort((a,b)=>a.id-b.id);}
function chunkArray(arr,size){const out=[];for(let i=0;i<arr.length;i+=size)out.push(arr.slice(i,i+size));return out;}
function fileSafe(s){return String(s||'학생').replace(/[\\/:*?"<>|]/g,'_');}
function showSaving(msg){let el=document.getElementById('pdfSavingToast');if(!el){el=document.createElement('div');el.id='pdfSavingToast';el.style.cssText='position:fixed;right:18px;bottom:18px;background:#0d1b2a;color:#fff;padding:12px 16px;border-radius:12px;z-index:999999;font-weight:900;box-shadow:0 12px 35px rgba(0,0,0,.25)';document.body.appendChild(el)}el.textContent=msg||'PDF 저장 중입니다...';}
function hideSaving(){const el=document.getElementById('pdfSavingToast');if(el)el.remove();}
async function savePdfFromElement(el,filename,opt={}){showSaving('PDF 저장 중입니다...');el.classList.add('pdf-capture-host');el.style.display='block';await new Promise(r=>setTimeout(r,250));const options=Object.assign({margin:0,filename,html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['.answer-row','.res-card','.diag-card','.chart-container']}},opt);try{await html2pdf().set(options).from(el).save();}finally{el.classList.remove('pdf-capture-host');el.style.display='none';hideSaving();}}
window.downloadBookPdf=async function(){readyPatch();const info=getDownloadUserInfo();const area=document.getElementById('bookDownloadArea');const pages=Array.from({length:29},(_,i)=>'assets/book/page-'+String(i+1).padStart(2,'0')+'.jpg');area.innerHTML=pages.map((src,idx)=>'<section class="pdf-page book-page"><img src="'+src+'" alt="교재 '+(idx+1)+'쪽"><div class="pdf-watermark">'+info.watermark+'</div></section>').join('');await savePdfFromElement(area,'프리미어_하이퍼_포커스_교재_'+fileSafe(info.name)+'.pdf',{html2canvas:{scale:1.25,useCORS:true,allowTaint:true,backgroundColor:'#ffffff'}});};
window.downloadAnswerPdf=async function(){readyPatch();const info=getDownloadUserInfo();const area=document.getElementById('answerDownloadArea');const pages=chunkArray(collectAllItemsSorted(),12);area.innerHTML=pages.map((items,pageIdx)=>'<section class="pdf-page"><div class="pdf-watermark">'+info.watermark+'</div><div class="answer-download-title">프리미어 하이퍼 포커스 전체 답안</div><div class="answer-download-meta">'+info.name+' 학생 · 승인번호 '+info.code+' · 1번부터 54번까지 번호순 정리 · '+(pageIdx+1)+'/'+pages.length+'</div>'+items.map(item=>'<div class="answer-row"><h4>'+item.id+'. '+item.text+'</h4><div class="answer">정답: '+(item.ans||'-')+'</div><p><strong>유형:</strong> '+(item.shortName||item.categoryTitle)+'</p><p><strong>풀이 핵심:</strong> '+(item.tTip||'')+'</p>'+(item.mTip?'<p><strong>지도 포인트:</strong> '+item.mTip+'</p>':'')+'</div>').join('')+'</section>').join('');await savePdfFromElement(area,'프리미어_하이퍼_포커스_전체답안_'+fileSafe(info.name)+'.pdf');};
window.downloadDiagnosisReport=async function(){readyPatch();const info=getDownloadUserInfo();const source=document.getElementById('result-area');if(!source){alert('먼저 진단 결과를 생성해 주세요.');return;}document.querySelectorAll('#resultListBox .res-card').forEach(card=>card.classList.add('open'));const area=document.getElementById('reportDownloadArea');const clone=source.cloneNode(true);clone.querySelectorAll('button,a.res-video-btn,.result-actions,.res-card-toggle').forEach(el=>el.remove());area.innerHTML='<div class="report-pdf-wrap"><div class="pdf-watermark">'+info.watermark+'</div><div class="report-pdf-title">종합 진단 결과 분석</div></div>';area.querySelector('.report-pdf-wrap').appendChild(clone);await savePdfFromElement(area,'종합_진단_결과_분석_'+fileSafe(info.name)+'.pdf',{pagebreak:{mode:['css','legacy'],avoid:['.res-card','.diag-card','.chart-container','.result-header']}});};
setInterval(readyPatch,500); readyPatch();
})();
<\/script>`;
  let html=await fetch(BASE_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('base fetch failed '+r.status);return r.text();});
  html=html.replace('<img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD">','<img class="intro-logo" src="'+LOGO_URL+'" alt="GFIELD">');
  html=html.replace('transition:opacity 1s ease,transform 1s cubic-bezier(.16,1,.3,1),filter 1s ease;','transition:opacity .55s ease,transform .55s cubic-bezier(.16,1,.3,1),filter .55s ease;');
  html=html.replace(/filter:blur\(10px\);/g,'filter:blur(5px);');
  html=html.replace(/animation:introSuck 3\.2s linear infinite;/g,'animation:introSuck 2.2s linear infinite;');
  html=html.replace(/const scenes=\['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'\],times=\[[^\]]+\]/,'const scenes=[\'gfieldIntroScene0\',\'gfieldIntroScene1\',\'gfieldIntroScene2\',\'gfieldIntroScene3\',\'gfieldIntroScene4\',\'gfieldIntroScene5\'],times=[0,1600,4200,5600,7100,8400]');
  html=html.replace(/\},900\);/g,'},560);');
  html=html.replace(/setTimeout\(\(\)=>window\.gfieldIntroGoDiagnosis\(\),20300\)/g,'setTimeout(()=>window.gfieldIntroGoDiagnosis(),11200)');
  html=html.replace('</head>',PDF_LIB+PATCH_CSS+'</head>');
  html=html.replace('</body>',PATCH_JS+'<div id="G_FIELD_PAGE_READY_MARKER"></div></body>');
  document.open();document.write(html);document.close();
})().catch(err=>{document.getElementById('boot').innerHTML='<div><h1>페이지 로딩 오류</h1><p>'+err.message+'</p></div>';});
