<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지필드 영재교육 — 프리미어 합격 진단 리포트</title>
<style>
html,body{margin:0;min-height:100%;background:#02050b;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}#boot{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 50% 40%,#14213d,#02050b 68%)}#boot h1{font-size:clamp(28px,6vw,64px);letter-spacing:-.06em;margin:0 0 12px}#boot p{color:#d4af37;font-weight:800;letter-spacing:.1em}.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.25);border-top-color:#d4af37;border-radius:50%;animation:s 1s linear infinite;margin:24px auto 0}@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div><h1>프리미어 하이퍼 포커스</h1><p>진단 페이지를 불러오는 중입니다</p><div class="spin"></div></div></div>
<script>
(async function(){
  const BASE_URL='https://raw.githubusercontent.com/docssam1/Hyper-Focus-answer-Key/ebcbacd3ef208a8ba2de36babc35a3858e08e23d/premier-hyper-focus/index.html';
  const LOGO_URL='https://lh3.googleusercontent.com/d/1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL';
  const PATCH_CSS=`
<style id="premier-phase1-css">
#G_FIELD_PAGE_READY_MARKER{display:none}
#gfieldIntro .intro-scene{transition:opacity .82s ease,transform .82s cubic-bezier(.16,1,.3,1),filter .82s ease!important;filter:blur(5px)}
#gfieldIntroScene3 .type-tunnel{display:block!important;opacity:.72!important;z-index:1!important}
#gfieldIntroScene3 .type-line{display:block!important;opacity:.50!important;font-size:clamp(13px,1.6vw,22px)!important}
#gfieldIntroScene3:before{content:"";position:absolute;left:20%;right:20%;top:27%;bottom:27%;z-index:2;background:radial-gradient(circle at center,rgba(2,5,11,.88),rgba(2,5,11,.60) 55%,transparent 80%);pointer-events:none}
#gfieldIntroScene3>div:not(.type-tunnel){position:relative;z-index:3}.btn-action-dark{background:#0d1b2a!important;color:#fff!important;border:2px solid #0d1b2a!important}.quick-download-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.quick-download-actions button{width:100%;padding:13px 12px;border-radius:8px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer}.quick-download-actions .dark{background:#000;color:#fff;border:1px solid #000}.quick-download-actions .light{background:#fff;color:#0d1b2a;border:1px solid rgba(201,168,76,.55)}
</style>`;
  const PATCH_JS=`
<script id="premier-phase1-js">
(function(){
function replaceIntroWording(){
  document.querySelectorAll('#gfieldIntroScene3 *').forEach(function(el){
    if(el.children.length===0 && el.textContent){
      el.textContent=el.textContent.replace(/대표\s*유형/g,'심화 대표 유형').replace(/빠르게\s*점검합니다/g,'약점유형을 진단합니다');
    }
  });
}
function readyPatch(){
  replaceIntroWording();
  var logo=document.querySelector('#gfieldIntro .intro-logo');if(logo){logo.src='${LOGO_URL}';}
  var login=document.querySelector('.login-card');if(login&&!login.querySelector('.quick-download-actions')){login.insertAdjacentHTML('beforeend','<div class="quick-download-actions"><button class="dark" type="button">📘 교재 다운로드</button><button class="light" type="button">🧾 전체 답안 다운로드</button></div>');}
  document.querySelectorAll('.result-actions').forEach(function(box){if(box.dataset.phase1Patched)return;box.dataset.phase1Patched='1';box.innerHTML='<button class="btn-action btn-action-outline" onclick="toggleAllAccordions()">📂 오답 상세 한 번에 보기</button><button class="btn-action btn-action-dark">📘 교재 다운로드</button><button class="btn-action btn-action-outline">🧾 전체 답안 다운로드</button><button class="btn-action btn-action-outline">📊 종합 진단 결과 분석</button>';});
}
setInterval(readyPatch,500);readyPatch();
})();
<\/script>`;
  let html=await fetch(BASE_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('base fetch failed '+r.status);return r.text();});
  html=html.replace('<img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD">','<img class="intro-logo" src="'+LOGO_URL+'" alt="GFIELD">');
  html=html.replace(/대표\s*유형/g,'심화 대표 유형');
  html=html.replace(/빠르게\s*점검합니다/g,'약점유형을 진단합니다');
  html=html.replace(/영재\s*클래스/g,'필즈 TOPCLASS');
  html=html.replace(/테마\s*프리미어/g,'소마 프리미어(대치)');
  html=html.replace('transition:opacity 1s ease,transform 1s cubic-bezier(.16,1,.3,1),filter 1s ease;','transition:opacity .82s ease,transform .82s cubic-bezier(.16,1,.3,1),filter .82s ease;');
  html=html.replace(/filter:blur\(10px\);/g,'filter:blur(5px);');
  html=html.replace(/animation:introSuck 3\.2s linear infinite;/g,'animation:introSuck 3s linear infinite;');
  html=html.replace(/const scenes=\['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'\],times=\[[^\]]+\]/,'const scenes=[\'gfieldIntroScene0\',\'gfieldIntroScene1\',\'gfieldIntroScene2\',\'gfieldIntroScene3\',\'gfieldIntroScene4\',\'gfieldIntroScene5\'],times=[0,2400,6500,8800,11000,13200]');
  html=html.replace(/\},900\);/g,'},850);');
  html=html.replace(/setTimeout\(\(\)=>window\.gfieldIntroGoDiagnosis\(\),20300\)/g,'setTimeout(()=>window.gfieldIntroGoDiagnosis(),17500)');
  html=html.replace('</head>',PATCH_CSS+'</head>');
  html=html.replace('</body>',PATCH_JS+'<div id="G_FIELD_PAGE_READY_MARKER"></div></body>');
  document.open();document.write(html);document.close();
})().catch(err=>{document.getElementById('boot').innerHTML='<div><h1>페이지 로딩 오류</h1><p>'+err.message+'</p></div>';});
</script>
</body>
</html>
