function loadScript(src){return new Promise(function(resolve,reject){if(document.querySelector('script[src="'+src+'"]'))return resolve();const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=function(){reject(new Error('스크립트를 불러오지 못했습니다: '+src))};document.head.appendChild(s);})}

function createWatermarkImage(text){const canvas=document.createElement('canvas');canvas.width=1240;canvas.height=1754;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(-Math.PI/180*28);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(143,145,155,0.06)';ctx.font='800 84px "Noto Sans KR", sans-serif';ctx.fillText(text,0,0);return canvas.toDataURL('image/png')}

function cloneWithCanvas(node){const clone=node.cloneNode(true);const sourceCanvases=node.querySelectorAll('canvas');const targetCanvases=clone.querySelectorAll('canvas');sourceCanvases.forEach(function(sourceCanvas,index){const targetCanvas=targetCanvases[index];if(!targetCanvas)return;targetCanvas.width=sourceCanvas.width;targetCanvas.height=sourceCanvas.height;const ctx=targetCanvas.getContext('2d');if(ctx)ctx.drawImage(sourceCanvas,0,0)});return clone}

function buildReportExportNode(){const resultArea=document.getElementById('result-area');if(!resultArea||getComputedStyle(resultArea).display==='none')return null;const root=createExportRoot();root.style.position='absolute';root.style.left='0';root.style.top='0';root.style.width='794px';root.style.opacity='1';root.style.pointerEvents='none';root.style.zIndex='999999';root.style.background='#fff';const sheet=document.createElement('section');sheet.className='pdf-sheet report-sheet';const title=(document.getElementById('reportTitle')?.textContent||'프리미어 하이퍼 포커스 종합 리포트').trim();const student=(document.getElementById('resName')?.textContent||'').trim();const wrongCount=(document.getElementById('resCount')?.textContent||'').trim();const diagnosis=document.getElementById('diagnosisContent');const resultList=document.getElementById('resultListBox');const chart=document.getElementById('diagnosisChart');const header=document.createElement('div');header.className='export-header';header.innerHTML='<h1>'+escapeHtml(title)+'</h1><p>'+escapeHtml(stampText())+' · 생성일 '+escapeHtml(new Date().toLocaleDateString('ko-KR'))+'</p>';sheet.appendChild(header);const summary=document.createElement('div');summary.className='export-card';summary.innerHTML='<h3>리포트 요약</h3><p><strong>'+escapeHtml(student)+'</strong> 학생의 현재 오답 수는 <strong>'+escapeHtml(wrongCount)+'</strong>개입니다.</p><p>이 리포트는 화면 인쇄가 아니라 PDF 파일로 바로 저장됩니다.</p>';sheet.appendChild(summary);if(chart&&typeof chart.toDataURL==='function'){const chartCard=document.createElement('div');chartCard.className='export-card export-chart';chartCard.innerHTML='<h3>진단 차트</h3><img src="'+chart.toDataURL('image/png')+'" alt="진단 차트" />';sheet.appendChild(chartCard)}if(diagnosis&&diagnosis.textContent.trim()){const diagnosisCard=document.createElement('div');diagnosisCard.className='export-card';const paragraphs=Array.from(diagnosis.querySelectorAll('p,li')).map(function(el){return '<p>'+escapeHtml((el.textContent||'').trim())+'</p>'}).join('');diagnosisCard.innerHTML='<h3>진단 분석</h3>'+(paragraphs||'<p>'+escapeHtml(diagnosis.textContent.trim())+'</p>');sheet.appendChild(diagnosisCard)}if(resultList&&resultList.textContent.trim()){const resultsCard=document.createElement('div');resultsCard.className='export-card export-results';resultsCard.innerHTML='<h3>오답 상세</h3>';const cards=Array.from(resultList.querySelectorAll('.res-card')).slice(0,50);cards.forEach(function(card){const item=document.createElement('div');item.style.border='1px solid #e5e7eb';item.style.borderRadius='10px';item.style.padding='12px';item.style.marginBottom='10px';const titleText=(card.querySelector('.res-card-title')?.textContent||'').trim();const bodyText=(card.querySelector('.res-card-body')?.textContent||'').trim().split(/\s+/).join(' ');item.innerHTML='<p><strong>'+escapeHtml(titleText)+'</strong></p><p>'+escapeHtml(bodyText)+'</p>';resultsCard.appendChild(item)});sheet.appendChild(resultsCard)}const watermark=document.createElement('div');watermark.className='pdf-watermark';watermark.innerHTML='<span>'+escapeHtml(stampText())+'</span>';sheet.appendChild(watermark);root.appendChild(sheet);return root}
