<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Hyper-Focus 기출유형 Answer Key</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #faf8f3;
            --red: #c0392b;
            --border: #e5e7eb;
            --text-main: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--cream); 
            color: var(--text-main); 
            line-height: 1.6; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* --- Login Page --- */
        #login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, var(--navy) 0%, #000 100%);
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--navy);
            word-break: keep-all;
        }
        .login-card p { font-size: 0.9rem; color: #666; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--navy); }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus { border-color: var(--gold); }
        
        /* Error Message Box */
        #error-msg {
            display: none;
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover { background: #1a2e44; }

        /* --- Main Content --- */
        #content-page { display: none; max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid var(--navy); padding-bottom: 20px; }
        header h1 { font-family: 'Noto Serif KR', serif; font-size: 1.8rem; color: var(--navy); margin-bottom: 15px; }
        
        .top-actions { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-youtube { background: var(--red); color: white; }
        .btn-print { background: var(--navy); color: white; }
        .btn-kakao { background: #FEE500; color: #3C1E1E; }
        .btn-action:hover { transform: translateY(-2px); opacity: 0.9; }

        .answer-container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .category-title {
            background: #f3f4f6;
            padding: 10px 20px;
            border-left: 5px solid var(--gold);
            font-weight: 700;
            margin: 30px 0 15px 0;
            color: var(--navy);
        }

        .answer-item {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .answer-item:last-child { border-bottom: none; }
        .q-header { display: flex; align-items: flex-start; gap: 10px; }
        .q-num {
            background: var(--navy);
            color: var(--gold);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .q-text { font-weight: 600; font-size: 1rem; color: var(--navy); }
        .q-ans { font-weight: 700; color: var(--red); font-size: 1.05rem; margin-left: 38px; padding: 5px 12px; background: #fff5f5; border-radius: 4px; display: inline-block; width: fit-content; }
        
        .q-details { margin-left: 38px; font-size: 0.9rem; color: #4b5563; background: #f9fafb; padding: 15px; border-radius: 8px; border-left: 3px solid #d1d5db; }
        .q-details strong { color: var(--navy); display: block; margin-bottom: 4px; }
        
        .btn-video-small {
            margin-left: 38px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--red);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 5px;
        }

        footer { text-align: center; margin-top: 50px; padding: 30px; color: #6b7280; font-size: 0.85rem; }

        @media print {
            #login-page, .top-actions, .btn-video-small { display: none !important; }
            #content-page { display: block !important; padding: 0; }
            .answer-container { box-shadow: none; border: none; }
            .answer-item { page-break-inside: avoid; }
            body { background: white; }
        }
    </style>
</head>
<body>

<script>
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);
    document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123 || 
           (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
           (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) {
            e.preventDefault();
            return false;
        }
    }, false);
</script>

    <footer>

</div>

    function checkAuth() {
        const code = document.getElementById('authCode').value;
        const errorMsg = document.getElementById('error-msg');
        if (code.startsWith('777200')) {
            errorMsg.style.display = 'none';
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('content-page').style.display = 'block';
            renderAnswers();
        } else {
            errorMsg.style.display = 'block';
        }
    }

    function renderAnswers() {
        const list = document.getElementById('answer-list');
        let html = '';
        data.forEach(cat => {
            html += `<div class="category-title">${cat.categoryTitle}</div>`;
            cat.items.forEach(item => {
                html += `
                <div class="answer-item">
                    <div class="q-header">
                        <div class="q-num">${item.id}</div>
                        <div class="q-text">${item.text}</div>
                    </div>
                    <div class="q-ans">정답: ${item.ans}</div>
                    <div class="q-details">
                        <strong>👨‍🏫 선생님 해설:</strong>
                        ${item.tTip}
                    </div>
                    <a href="${item.video}" target="_blank" class="btn-video-small">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        해설 영상 보기
                    </a>
                </div>`;
            });
        });
        list.innerHTML = html;
    }

    document.getElementById('authCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { checkAuth(); }
    });
</script>
</body>
</html>
