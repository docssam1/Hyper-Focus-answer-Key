name: Restore Premier Diagnosis Index With Intro

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/restore-diagnosis-index.yml"

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download diagnosis HTML and inject intro
        run: |
          python - <<'PY'
          import requests
          from pathlib import Path

          file_id = "1n4VmxQF48CIbQdP3Wq84GntwYCYHj056"
          url = f"https://drive.google.com/uc?export=download&id={file_id}"
          session = requests.Session()
          r = session.get(url, stream=True)
          r.raise_for_status()
          token = None
          for k, v in r.cookies.items():
              if k.startswith("download_warning"):
                  token = v
                  break
          if token:
              r = session.get(url + f"&confirm={token}", stream=True)
              r.raise_for_status()
          html = r.content.decode("utf-8-sig", errors="replace")
          if "프리미어 합격 진단 리포트" not in html or "진단 시작하기" not in html:
              raise SystemExit("Downloaded file is not the diagnosis page")

          intro_css = r'''
          <style id="gfield-intro-restore-style">
          body.intro-active{background:#02050b!important;overflow:hidden}body.intro-active>*:not(#gfieldIntro){display:none!important}
          #gfieldIntro{position:fixed;inset:0;z-index:99999;height:100dvh;min-height:100vh;overflow:hidden;background:#02050b;color:#fff;font-family:'Noto Sans KR',sans-serif}#gfieldIntro[hidden]{display:none!important}
          #gfieldIntro .intro-bg{position:absolute;inset:0;background:radial-gradient(circle at 16% 10%,rgba(22,65,124,.62),transparent 34%),radial-gradient(circle at 82% 16%,rgba(212,175,55,.22),transparent 30%),radial-gradient(circle at 50% 88%,rgba(124,58,237,.18),transparent 36%),linear-gradient(135deg,#02050b,#07111f 60%,#010205)}
          #gfieldIntro .intro-bg:before{content:"";position:absolute;inset:0;background-image:linear-gradient(to right,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.035) 1px,transparent 1px);background-size:36px 36px;mask-image:radial-gradient(circle at center,#000,transparent 82%)}
          #gfieldIntro video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92}#gfieldIntro:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(2,5,11,.04),rgba(2,5,11,.54) 55%,rgba(2,5,11,.94));pointer-events:none}
          #gfieldIntro .intro-skip{position:absolute;top:max(18px,env(safe-area-inset-top));right:18px;z-index:50;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);backdrop-filter:blur(14px);color:white;border-radius:999px;padding:10px 16px;font-size:12px;font-weight:900;letter-spacing:.14em;cursor:pointer}
          #gfieldIntro .intro-scene{position:absolute;inset:0;z-index:10;display:grid;place-items:center;text-align:center;padding:calc(28px + env(safe-area-inset-top)) 24px 28px;opacity:0;transform:translateY(26px) scale(.975);filter:blur(10px);transition:opacity 1s ease,transform 1s cubic-bezier(.16,1,.3,1),filter 1s ease;pointer-events:none}#gfieldIntro .intro-scene.on{opacity:1;transform:none;filter:none;pointer-events:auto}
          #gfieldIntro .gold{color:#d4af37;text-shadow:0 0 32px rgba(212,175,55,.34)}#gfieldIntro .kicker{font-size:12px;font-weight:900;letter-spacing:.32em;color:#f8dd83}#gfieldIntro .intro-title{font-size:clamp(44px,9vw,118px);font-weight:900;line-height:.9;letter-spacing:-.085em}#gfieldIntro .intro-subtitle{font-size:clamp(25px,5vw,60px);font-weight:900;line-height:1.14;letter-spacing:-.068em}#gfieldIntro .mt{margin-top:22px}#gfieldIntro .intro-logo{width:min(130px,30vw);opacity:.95;margin-bottom:20px}
          #gfieldIntro .records{width:min(1120px,calc(100% - 32px));margin:0 auto;display:grid;grid-template-columns:1fr minmax(270px,.8fr) 1fr;gap:16px;align-items:center;justify-items:center}#gfieldIntro .stack{display:grid;gap:12px;width:100%;max-width:330px;margin:0 auto}#gfieldIntro .record{width:100%;border:1px solid rgba(255,255,255,.14);background:rgba(2,6,23,.52);backdrop-filter:blur(16px);border-radius:26px;padding:18px;text-align:left;box-shadow:0 24px 70px rgba(0,0,0,.36);opacity:0;transform:translateY(16px) scale(.97);transition:.52s cubic-bezier(.22,1,.36,1)}#gfieldIntro .record.on{opacity:1;transform:translateY(0) scale(1);border-color:rgba(212,175,55,.38)}#gfieldIntro .record.pop{animation:introPop .36s cubic-bezier(.22,1,.36,1)}@keyframes introPop{0%{transform:scale(1)}45%{transform:scale(1.055);box-shadow:0 0 60px rgba(212,175,55,.24)}100%{transform:scale(1)}}
          #gfieldIntro .recordTitle{display:flex;justify-content:space-between;gap:10px;font-size:15px;font-weight:900;letter-spacing:-.045em}#gfieldIntro .recordTitle small{font-size:10px;color:#d4af37;letter-spacing:.08em}#gfieldIntro .year{display:grid;grid-template-columns:52px 1fr 46px;gap:8px;align-items:center;margin-top:8px;color:#cbd5e1;font-size:12px}#gfieldIntro .bar{height:6px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}#gfieldIntro .bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#d4af37);border-radius:999px;transition:.55s cubic-bezier(.22,1,.36,1)}#gfieldIntro .ynum{text-align:right;color:white;font-weight:900}#gfieldIntro .total{text-align:right;margin-top:12px;color:#d4af37;font-weight:900;letter-spacing:-.06em}#gfieldIntro .total b{font-size:34px}
          #gfieldIntro .grand{width:100%;max-width:360px;min-height:330px;border:1px solid rgba(212,175,55,.28);border-radius:36px;background:radial-gradient(circle at 50% 45%,rgba(212,175,55,.24),transparent 64%),rgba(0,0,0,.26);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 100px rgba(212,175,55,.13);position:relative;overflow:hidden}#gfieldIntro .grand:before{content:"";position:absolute;inset:14px;border-radius:28px;border:1px solid rgba(255,255,255,.08)}#gfieldIntro .glabel,#gfieldIntro .gnum,#gfieldIntro .gunit,#gfieldIntro .gnote{position:relative}#gfieldIntro .glabel{color:#e5e7eb;font-size:15px;font-weight:900}#gfieldIntro .gnum{margin-top:8px;font-size:clamp(86px,12vw,152px);line-height:.82;font-weight:900;letter-spacing:-.095em;transition:.34s cubic-bezier(.22,1,.36,1)}#gfieldIntro .gnum.hit{transform:scale(1.1);color:#d4af37;text-shadow:0 0 52px rgba(212,175,55,.38)}#gfieldIntro .gunit{margin-top:10px;font-size:28px;font-weight:900;color:#d4af37}#gfieldIntro .gnote{margin-top:12px;color:#cbd5e1;font-size:12px;line-height:1.55}
          #gfieldIntro .type-tunnel{position:absolute;inset:0;perspective:760px;overflow:hidden}#gfieldIntro .type-line{position:absolute;left:50%;top:50%;white-space:nowrap;color:rgba(255,255,255,.78);font-weight:900;letter-spacing:-.04em;font-size:clamp(16px,3.5vw,40px);text-shadow:0 12px 32px rgba(0,0,0,.6);animation:introSuck 3.2s linear infinite;filter:blur(1.2px);opacity:.7}#gfieldIntro .type-line:nth-child(2n){color:rgba(248,221,131,.72);filter:blur(2px)}#gfieldIntro .type-line:nth-child(3n){opacity:.45;filter:blur(3.2px)}@keyframes introSuck{0%{transform:translate3d(var(--x),var(--y),260px) rotateX(62deg) rotateZ(var(--r)) scale(1.35);opacity:0}14%{opacity:.85}76%{opacity:.52}100%{transform:translate3d(-50%,-50%,-540px) rotateX(78deg) rotateZ(calc(var(--r) + 90deg)) scale(.04);opacity:0;filter:blur(7px)}}
          #gfieldIntro .count-num{font-size:clamp(90px,24vw,220px);font-weight:900;color:#f8dd83;line-height:.8;text-shadow:0 0 68px rgba(212,175,55,.42);animation:introCountPop .7s ease}#gfieldIntro .count-label{font-size:clamp(20px,4vw,38px);font-weight:900;margin-bottom:16px}@keyframes introCountPop{0%{transform:scale(.65);opacity:0}55%{transform:scale(1.12);opacity:1}100%{transform:scale(1)}}@media(max-width:960px){#gfieldIntro .records{grid-template-columns:1fr}#gfieldIntro .grand{order:-1;min-height:250px}#gfieldIntro .record{padding:14px;border-radius:20px}#gfieldIntro .intro-scene{padding:70px 16px 28px}#gfieldIntro .intro-title{font-size:clamp(42px,15vw,86px)}#gfieldIntro .intro-subtitle{font-size:clamp(26px,9vw,46px)}#gfieldIntro .type-line{font-size:clamp(15px,5.2vw,30px)}}
          </style>
          '''

          intro_html = r'''
          <div id="gfieldIntro"><div class="intro-bg"></div><video id="gfieldIntroVideo" autoplay muted playsinline preload="auto" poster="https://drive.google.com/uc?export=view&id=1PXJ2SfpDHl2xoWNrzluxPWlPuHS0UbfE"><source src="https://drive.google.com/uc?export=download&id=1D36lFjE2Ha1u7N2FV5H0tGgIQlsleL3u" type="video/mp4"></video><button class="intro-skip" type="button" onclick="gfieldIntroGoDiagnosis()">SKIP</button><section class="intro-scene on" id="gfieldIntroScene0"><div><img class="intro-logo" src="https://drive.google.com/uc?export=view&id=1c2yx_O6sKcTF9-YoTKxnQ2lWOqfWiUCL" alt="GFIELD"><h1 class="intro-subtitle">실적으로 입증된<br>성공하는 공부습관을<br>만드는<br><span class="gold">지필드 영재교육</span></h1></div></section><section class="intro-scene" id="gfieldIntroScene1"><div style="width:100%"><div class="records"><div class="stack" id="gfieldIntroLeftStack"></div><div class="grand"><div class="glabel">연도별 누적 실적</div><div class="gnum" id="gfieldIntroGrandNum">0</div><div class="gunit">명</div><div class="gnote">대표 실적은 일부입니다.<br>가운데 숫자는 실제 전체 누적 실적입니다.</div></div><div class="stack" id="gfieldIntroRightStack"></div></div></div></section><section class="intro-scene" id="gfieldIntroScene2"><div><p class="kicker gold">PREMIER DIAGNOSIS</p><h2 class="intro-subtitle mt">소마 프리미어 합격을 위한<br>대표 심화 유형 진단</h2></div></section><section class="intro-scene" id="gfieldIntroScene3"><div class="type-tunnel" id="gfieldIntroTypeTunnel"></div><div style="position:relative;z-index:2"><p class="kicker gold">REPRESENTATIVE TYPES</p><h2 class="intro-subtitle mt">대표 유형을<br>빠르게 점검합니다</h2></div></section><section class="intro-scene" id="gfieldIntroScene4"><div><p class="kicker gold">G-FIELD SPECIAL PROGRAM</p><h2 class="intro-title mt">프리미어<br><span class="gold">하이퍼 포커스</span></h2></div></section><section class="intro-scene" id="gfieldIntroScene5"><div><div class="count-label">진단 시작까지</div><div class="count-num" id="gfieldIntroCountNum">5</div></div></section></div>
          '''

          intro_js = r'''
          <script id="gfield-intro-restore-script">
          (function(){document.body.classList.add('intro-active');const scenes=['gfieldIntroScene0','gfieldIntroScene1','gfieldIntroScene2','gfieldIntroScene3','gfieldIntroScene4','gfieldIntroScene5'],times=[0,2600,7600,10300,13200,15600];const recordData={left:[{title:'영재 클래스',years:[['2023',6],['2024',4],['2025',6]],total:40},{title:'생각하는 황소 경시',years:[['2021',15],['2022',14],['2023',18],['2024',15]],total:62}],right:[{title:'테마 프리미어',years:[['2023',6],['2024',4],['2025',4]],total:87},{title:'영재원ㆍ특목 경시',years:[['대비',8],['누적',12]],total:120}],grand:400};const typeTexts=['쌓기나무와 입체도형','전개도와 주사위','색종이 접기와 펀칭','도형 개수 세기','수와 연산 퍼즐','논리표 조건 추론','최단 거리 가짓수','양팔저울 무게 비교','규칙 찾기','암호 풀기','거울과 디지털 수','달력과 시계','조건에 알맞은 수','평면도형 분할','입체도형 관찰'];function showScene(n){scenes.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.classList.toggle('on',i===n)});if(n===1)runRecords();if(n===3)runTypes();if(n===5)runCountdown()}function panel(item){const max=Math.max(...item.years.map(y=>y[1]),1);return `<div class="record"><div class="recordTitle"><span>${item.title}</span><small>RECORD</small></div>${item.years.map(y=>`<div class="year" data-count="${y[1]}" data-max="${max}"><span>${y[0]}</span><div class="bar"><span></span></div><b class="ynum">0</b></div>`).join('')}<div class="total"><b data-total="${item.total}">0</b><span>명</span></div></div>`}function countTo(el,target,duration=700){if(!el)return;const start=performance.now(),from=parseInt((el.textContent||'0').replace(/[^0-9]/g,''),10)||0,diff=target-from;function frame(now){const p=Math.min((now-start)/duration,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(from+diff*e).toLocaleString('ko-KR');if(p<1)requestAnimationFrame(frame)}requestAnimationFrame(frame)}function runRecords(){if(window.gfieldIntroRecordsStarted)return;window.gfieldIntroRecordsStarted=true;const left=document.getElementById('gfieldIntroLeftStack'),right=document.getElementById('gfieldIntroRightStack');if(!left||!right)return;left.innerHTML=recordData.left.map(panel).join('');right.innerHTML=recordData.right.map(panel).join('');[...document.querySelectorAll('#gfieldIntro .record')].forEach((card,i)=>{setTimeout(()=>{card.classList.add('on','pop');card.querySelectorAll('.year').forEach((row,j)=>{setTimeout(()=>{const c=+row.dataset.count,m=+row.dataset.max;row.querySelector('.bar span').style.width=Math.max(18,Math.round(c/m*100))+'%';countTo(row.querySelector('.ynum'),c,430)},j*135)});setTimeout(()=>countTo(card.querySelector('[data-total]'),+card.querySelector('[data-total]').dataset.total,720),420);setTimeout(()=>card.classList.remove('pop'),500)},i*360)});setTimeout(()=>countTo(document.getElementById('gfieldIntroGrandNum'),recordData.grand,1850),680);setTimeout(()=>document.getElementById('gfieldIntroGrandNum')?.classList.add('hit'),2600);setTimeout(()=>document.getElementById('gfieldIntroGrandNum')?.classList.remove('hit'),3200)}function runTypes(){if(window.gfieldIntroTypesStarted)return;window.gfieldIntroTypesStarted=true;const box=document.getElementById('gfieldIntroTypeTunnel');if(!box)return;for(let i=0;i<44;i++){const el=document.createElement('div');el.className='type-line';el.textContent=typeTexts[i%typeTexts.length];el.style.setProperty('--x',(Math.random()*160-80)+'vw');el.style.setProperty('--y',(Math.random()*120-60)+'vh');el.style.setProperty('--r',(Math.random()*90-45)+'deg');el.style.animationDelay=(i*.075)+'s';box.appendChild(el)}}function runCountdown(){if(window.gfieldIntroCountStarted)return;window.gfieldIntroCountStarted=true;let n=5;const countNum=document.getElementById('gfieldIntroCountNum');countNum.textContent=n;const timer=setInterval(()=>{n--;if(n<=0){clearInterval(timer);window.gfieldIntroGoDiagnosis();return}countNum.textContent=n;countNum.style.animation='none';countNum.offsetHeight;countNum.style.animation='introCountPop .7s ease'},900)}window.gfieldIntroGoDiagnosis=function(){const intro=document.getElementById('gfieldIntro');if(intro)intro.hidden=true;document.body.classList.remove('intro-active');window.scrollTo(0,0)};times.forEach((t,i)=>setTimeout(()=>showScene(i),t));setTimeout(()=>window.gfieldIntroGoDiagnosis(),20300);const video=document.getElementById('gfieldIntroVideo');if(video)video.addEventListener('error',()=>{video.style.display='none'})})();
          </script>
          '''

          if 'gfield-intro-restore-style' not in html:
              html = html.replace('</head>', intro_css + '\n</head>')
          if 'id="gfieldIntro"' not in html:
              html = html.replace('<body>', '<body>\n' + intro_html)
          if 'gfield-intro-restore-script' not in html:
              html = html.replace('</body>', intro_js + '\n</body>')

          Path("premier-hyper-focus").mkdir(parents=True, exist_ok=True)
          Path("premier-hyper-focus/index.html").write_text(html, encoding="utf-8")
          print("Restored diagnosis index with intro")
          PY

      - name: Commit restored diagnosis page with intro
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add premier-hyper-focus/index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Restore diagnosis page with intro [skip ci]"
            git push
          fi
